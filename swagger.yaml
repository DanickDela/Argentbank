swagger: "2.0"
info:
  title: ArgentBank Transactions API
  description: API documentation for managing user account transactions
  version: "1.0.0"

host: localhost:3001
basePath: /api/v1
schemes:
  - http

tags:
  - name: Transactions
    description: Operations related to bank account transactions

paths:
  /accounts/{accountId}/transactions:
    get:
      tags:
        - Transactions
      summary: Get transactions for a specific account and month
      description: Returns all transactions for a given bank account and month
      parameters:
        - in: path
          name: accountId
          required: true
          type: string
          description: Unique identifier of the bank account
        - in: query
          name: month
          required: true
          type: string
          example: "2026-03"
          description: Month of transactions in YYYY-MM format
        - in: header
          name: Authorization
          required: true
          type: string
          description: Bearer token for user authentication
      responses:
        "200":
          description: List of account transactions
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Transactions retrieved successfully
              body:
                type: array
                items:
                  $ref: "#/definitions/Transaction"
        "400":
          description: Invalid parameters
        "401":
          description: Unauthorized
        "404":
          description: Account not found

  /transactions/{transactionId}:
    get:
      tags:
        - Transactions
      summary: Get transaction details
      description: Returns detailed information for one transaction
      parameters:
        - in: path
          name: transactionId
          required: true
          type: string
          description: Unique identifier of the transaction
        - in: header
          name: Authorization
          required: true
          type: string
          description: Bearer token for user authentication
      responses:
        "200":
          description: Transaction details retrieved successfully
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Transaction retrieved successfully
              body:
                $ref: "#/definitions/TransactionDetail"
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found

    patch:
      tags:
        - Transactions
      summary: Update transaction information
      description: Update editable fields of a transaction such as category or note
      parameters:
        - in: path
          name: transactionId
          required: true
          type: string
          description: Unique identifier of the transaction
        - in: header
          name: Authorization
          required: true
          type: string
          description: Bearer token for user authentication
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/TransactionUpdate"
      responses:
        "200":
          description: Transaction updated successfully
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Transaction updated successfully
              body:
                $ref: "#/definitions/TransactionDetail"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found

definitions:
  Transaction:
    type: object
    properties:
      id:
        type: string
        example: txn_001
      date:
        type: string
        format: date
        example: "2026-03-18"
      description:
        type: string
        example: Golden Sun Bakery
      amount:
        type: number
        format: float
        example: 8.5
      balance:
        type: number
        format: float
        example: 298.75
      type:
        type: string
        example: Electronic
      category:
        type: string
        example: Food
      note:
        type: string
        example: Breakfast purchase

  TransactionDetail:
    type: object
    properties:
      id:
        type: string
        example: txn_001
      accountId:
        type: string
        example: acc_12345
      date:
        type: string
        format: date
        example: "2026-03-18"
      description:
        type: string
        example: Golden Sun Bakery
      amount:
        type: number
        format: float
        example: 8.5
      balance:
        type: number
        format: float
        example: 298.75
      type:
        type: string
        example: Electronic
      category:
        type: string
        example: Food
      note:
        type: string
        example: Breakfast purchase

  TransactionUpdate:
    type: object
    properties:
      category:
        type: string
        example: Groceries
      note:
        type: string
        example: Paid with debit card
