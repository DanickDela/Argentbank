swagger: "2.0"

info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: "1.0.0"
  termsOfService: "http://swagger.io/terms/"
host: localhost:3001
basePath: /api/v1
schemes:
  - https

tags:
  - name: User Module
    description: Everything about users
  - name: Acounts and Transactions Module
    description: Everything about accounts and transactions

paths:
  /user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: API for Login
      parameters:
        - in: body
          name: body
          description: Login Payload
          required: true
          schema:
            $ref: "#/definitions/Login"
      produces:
        - application/json
      responses:
        "200":
          description: Login Successfully
          schema:
            $ref: "#/definitions/LoginResponse"
        "400":
          description: Invalid Fields
        "500":
          description: Internal Server Error

  /user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: API for Signup
      parameters:
        - in: body
          name: body
          description: Signup Payload
          required: true
          schema:
            $ref: "#/definitions/User"
      produces:
        - application/json
      responses:
        "200":
          description: Signup Successfully
          schema:
            $ref: "#/definitions/ApiResponse"
        "400":
          description: Invalid Fields
        "500":
          description: Internal Server Error
  /user/profile:
    post:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for fetching a user profile
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: User profile retrieved successfully
          schema:
            $ref: "#/definitions/ApiResponse"
        "400":
          description: Invalid Fields
        "500":
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: User Profile API
      description: API for updating a user profile
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          required: true
          type: string
        - in: body
          name: body
          description: Update user profile attributes
          required: true
          schema:
            $ref: "#/definitions/UserProfile"
      produces:
        - application/json
      responses:
        "200":
          description: User profile retrieved successully
          schema:
            $ref: "#/definitions/ApiResponse"
        "400":
          description: Invalid Fields
        "500":
          description: Internal Server Error

  /user/accounts:
    get:
      security:
        - Bearer: []
      tags:
        - Accounts and Transactions Module
      summary: Get user accounts
      description: API for fetching all accounts of the authenticated user
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: User accounts retrieved successfully
          schema:
            $ref: "#/definitions/AccountsResponse"
        "401":
          description: Unauthorized
        "404":
          description: Accounts not found
        "500":
          description: Internal Server Error

  /user/accounts/{accountId}/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Accounts and Transactions Module
      summary: Get all transactions of an account
      description: API for retrieving the list of transactions for an account
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          required: true
          type: string
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: All transactions retrieved successfully
          schema:
            $ref: "#/definitions/TransactionsResponse"
        "401":
          description: Unauthorized user
        "404":
          description: Account not found
        "500":
          description: Internal Server Error

    post:
      security:
        - Bearer: []
      tags:
        - Accounts and Transactions Module
      summary: Add a transaction to an account
      description: API for adding a new transaction to a specific account
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          required: true
          type: string
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: body
          name: body
          description: Transaction data needed to create a new transaction
          required: true
          schema:
            $ref: "#/definitions/AddTransaction"
      produces:
        - application/json
      responses:
        "201":
          description: Transaction added successfully
          schema:
            $ref: "#/definitions/AddTransactionResponse"
        "400":
          description: Invalid fields
        "401":
          description: Unauthorized
        "404":
          description: Account not found
        "500":
          description: Internal Server Error

  /user/accounts/{accountId}/transactions/{transactionId}:
    put:
      security:
        - Bearer: []
      tags:
        - Accounts and Transactions Module
      summary: Update a transaction of an account
      description: API for updating a specific transaction of a specific account
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          required: true
          type: string
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: path
          name: transactionId
          description: ID of the transaction to update
          required: true
          type: string
        - in: body
          name: body
          description: Transaction fields to update
          required: true
          schema:
            $ref: "#/definitions/EditTransaction"
      produces:
        - application/json
      responses:
        "200":
          description: Transaction updated successfully
          schema:
            $ref: "#/definitions/UpdateTransactionResponse"
        "400":
          description: Invalid fields
        "401":
          description: Unauthorized
        "404":
          description: Account or transaction not found
        "500":
          description: Internal Server Error

    delete:
      security:
        - Bearer: []
      tags:
        - Accounts and Transactions Module
      summary: Delete a transaction of an account
      description: API for deleting a specific transaction of a specific account
      parameters:
        - in: header
          name: Authorization
          description: Attach Bearer JWT token
          required: true
          type: string
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: path
          name: transactionId
          description: ID of the transaction to delete
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: Transaction deleted successfully
          schema:
            $ref: "#/definitions/DeleteTransactionResponse"
        "400":
          description: Invalid fields
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found
        "500":
          description: Internal Server Error

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header

definitions:
  User:
    type: object
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
      firstName:
        type: string
        description: user first name
      lastName:
        type: string
        description: user last name
  Login:
    type: object
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
  LoginResponse:
    type: object
    properties:
      token:
        type: string
  UserProfile:
    type: object
    properties:
      firstName:
        type: string
      lastName:
        type: string

  Account:
    type: object
    properties:
      id:
        type: string
        description: Unique identifier of the account
        example: "acc_8349"
      name:
        type: string
        description: Account display name
        example: "Argent Bank Checking"
      accountNumber:
        type: string
        description: Masked account number
        example: "x8349"
      balance:
        type: number
        description: Account balance
        example: 2082.79
      balanceType:
        type: string
        description: Type of displayed balance
        example: "Available Balance"

  AccountsResponse:
    type: object
    properties:
      status:
        type: integer
        example: 200
      message:
        type: string
        example: "User accounts retrieved successfully"
      body:
        type: array
        items:
          $ref: "#/definitions/Account"

  Transaction:
    type: object
    properties:
      id:
        type: string
        description: ID of the transaction
        example: "txn_001"
      type:
        type: string
        description: Type of transaction
        example: "Electronic"
      date:
        type: string
        description: Date of the transaction
        example: "2020-07-20"
      amount:
        type: number
        description: Amount of the transaction
        example: 5.00
      description:
        type: string
        description: Description of the transaction
        example: "Golden Sun Bakery"
      category:
        type: string
        description: Category of the transaction
        example: "Food"
      notes:
        type: string
        description: Notes related to the transaction
        example: "Very nice"

  TransactionsResponse:
    type: object
    properties:
      status:
        type: integer
        example: 200
      message:
        type: string
        example: "Transaction list retrieved successfully"
      body:
        type: array
        items:
          $ref: "#/definitions/Transaction"

  DeleteTransactionResponse:
    type: object
    properties:
      status:
        type: integer
        example: 200
      message:
        type: string
        example: "Transaction deleted successfully"

  AddTransaction:
    type: object
    required:
      - amount
      - description
    properties:
      amount:
        type: number
        description: Amount of the new transaction
        example: 50.01
      description:
        type: string
        description: Description of the new transaction
        example: "Restaurant payment"
      category:
        type: string
        description: Category of the new transaction
        example: "Food"
      notes:
        type: string
        description: Notes of the new transaction
        example: "Dinner with friends"
      date:
        type: string
        description: Date of the new transaction
        example: "2026-04-04"

  AddTransactionResponse:
    type: object
    properties:
      status:
        type: integer
        example: 201
      message:
        type: string
        example: "Transaction added successfully"
      body:
        type: object
        properties:
          transactionId:
            type: string
            example: "txn_011"

  EditTransaction:
    type: object
    properties:
      category:
        type: string
        description: New category of this transaction
        example: "Devices"
      notes:
        type: string
        description: New notes of this transaction
        example: "Smartphone update"

  UpdateTransactionResponse:
    type: object
    properties:
      status:
        type: integer
        example: 200
      message:
        type: string
        example: "Transaction updated successfully"
